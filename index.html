<!DOCTYPE html>
<html>
<head>
  <title>Swipe Home</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    .card { width:300px; margin:50px auto; padding:20px; background:#222; border-radius:20px; }
    button { padding:10px 20px; margin:10px; border:none; border-radius:10px; cursor:pointer; }
    .like { background:#0f0; }
    .nope { background:#f00; }
    input { margin:5px; padding:8px; width:90%; }
  </style>
</head>
<body>

<h1>🏠 Swipe Home</h1>

<div class="card" id="card"></div>

<div id="form" style="display:none;">
  <h3>Send your interest</h3>
  <input id="name" placeholder="Name"><br>
  <input id="phone" placeholder="Phone"><br>
  <button onclick="submitLead()">Submit</button>
</div>

<script>
let properties = [
  {title:"Studio Paris", price:"€900"},
  {title:"1 Bedroom Paris", price:"€1300"},
  {title:"Student Flat", price:"€700"}
];

let index = 0;

function showCard(){
  if(index >= properties.length){
    document.getElementById("card").innerHTML = "No more properties";
    return;
  }
  let p = properties[index];
  document.getElementById("card").innerHTML =
    `<h2>${p.title}</h2>
     <p>${p.price}</p>
     <button class="nope" onclick="next()">❌</button>
     <button class="like" onclick="interest()">❤️</button>`;
}

function next(){
  index++;
  showCard();
}

function interest(){
  document.getElementById("form").style.display = "block";
}

function submitLead(){
  alert("Lead sent!");
  document.getElementById("form").style.display = "none";
  index++;
  showCard();
}

showCard();
</script>

</body>
</html>
